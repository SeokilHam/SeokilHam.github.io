  - title: "Conference Reviewer, NeurIPS"
    year: "2025"
  - title: "Conference Reviewer, ICCV"
    year: "2025"
  - title: "Conference Reviewer, CVPR"
    year: "2025"

# CV PDF path
cv_pdf                   : "/files/Seokil_Ham_CV.pdf"

url                      : https://SeokilHam.github.io
baseurl                  : ""
repository               : "SeokilHam/SeokilHam.github.io"

# Site Author
author:
  avatar           : "profile.jpeg"
  name             : "Seokil Ham"
  pronouns         : he/his
  bio              : "Ph.D. student at KAIST working on LLM/MLLM safety, efficiency, and reasoning."
  location         : "291 Daehak-ro, Yuseong-gu, Daejeon 34141, Republic of Korea"
  employer         : "KAIST\n(Korea Advanced Institute of Science and Technology)"
  uri              :
  email            : "gkatjrdlf@kaist.ac.kr"

  education:
    - degree : "Ph.D. in Electrical Engineering"
      school : "KAIST"
      years  : "2023 – present"
    - degree : "M.S. in Electrical Engineering"
