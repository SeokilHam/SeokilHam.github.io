# Welcome to Jekyll!
#
# This config file is meant for settings that affect your entire site, values
# which you are expected to set up once and rarely need to edit after that.
# For technical reasons, this file is *NOT* reloaded automatically when you use
# `jekyll serve -l -H localhost`. If you change this file, please restart the 
# server process.

# Basic Site Settings
locale                   : "en-US"
site_theme               : "default"
title                    : "Seokil Ham"
title_separator          : "-"
name                     : &name "Seokil Ham"
description              : &description "Seokil Ham's academic portfolio"
home_intro               : |
  I am a Ph.D. student in Electrical Engineering at KAIST, advised by Prof. Changick Kim. 
  My research primarily focuses on the safety, efficiency, and reasoning of Large Language 
  Models and Multimodal Large Language Models, while maintaining broad interests across 
  machine learning and computer vision. If you are interested in my work or would like to 
  discuss potential internship opportunities in AI research, please feel free to reach out.

home_nav:
  - id: publications
    title: Publications
    type: publications
  - id: others
    title: Others
    children:
      - id: research-experience
        title: Research Experience
        type: research_experience
      - id: projects
        title: Projects
        type: projects
      - id: teaching
        title: Teaching
        collection: teaching
        include: archive-single-cv.html
      - id: honors
        title: Honors and Awards
        type: honors
      - id: academic-activities
        title: Academic Activities
        type: academic_activities

# Honors and Awards
honors:
  - title: "Korean Government Scholarship"
    year: "2019 – present"
  - title: "Summa Cum Laude, Chung-Ang University"
    year: "2021"

# Academic Activities
