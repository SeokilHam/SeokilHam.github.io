# Welcome to Jekyll!
#
# This config file is meant for settings that affect your entire site, values
# which you are expected to set up once and rarely need to edit after that.
# For technical reasons, this file is *NOT* reloaded automatically when you use
# `jekyll serve -l -H localhost`. If you change this file, please restart the 
# server process.

# Basic Site Settings
locale                   : "en-US"
site_theme               : "default" # The available themes options are "default", "air", "sunrise", "mint", "dirt" and "contrast"
title                    : "Seokil Ham"
title_separator          : "-"
name                     : &name "Seokil Ham"
description              : &description "Seokil Ham's academic portfolio"   # Update this with a general description of your site, this is the default if not overridden by a page
# 홈 상단 인트로 문구 (Publications 위). 마크다운 사용 가능 (**볼드**, - 리스트 등)
home_intro               : |
  I am a Ph.D. student in Electrical Engineering at KAIST, advised by Prof. Changick Kim. 
  My research primarily focuses on the safety, efficiency, and reasoning of Large Language 
  Models and Multimodal Large Language Models, while maintaining broad interests across 
  machine learning and computer vision.

# 홈 상단 탭/섹션 구성. 순서대로 표시되며, 항목을 빼면 헤더와 본문에서 모두 제외됨.
# - id: URL 해시 및 탭 식별자
# - title: 탭/섹션 제목
# - type: "publications" → Publications 리스트 (고정 include)
# - children: 있으면 그룹 섹션(예: Others)으로, 하위 항목이 하위 카테고리로 표시됨
#   - id, title: 하위 섹션 id/제목
#   - collection: Jekyll 컬렉션 이름 (talks, teaching 등)
#   - include: 각 항목 렌더용 include 파일명
home_nav:
  - id: publications
    title: Publications
    type: publications
  - id: others
    title: Others
    children:
      - id: research-experience
        title: Research Experience
        type: research_experience
      - id: patents
        title: Patents
        type: patents
      - id: projects
        title: Projects
        type: projects
      # - id: talks
      #   title: Talks
      #   collection: talks
      #   include: archive-single-talk-cv.html
      - id: teaching
        title: Teaching
        collection: teaching
        include: archive-single-cv.html
      - id: academic-activities
        title: Academic Activities
        type: academic_activities

# Academic Activities (Others 하위, config만 사용) — title, year(선택)
academic_activities:
  - title: "Conference Reviewer, ICIP"
    year: "2026"
  - title: "Conference Reviewer, ICML"
    year: "2026"
  - title: "Conference Reviewer, AAAI"
    year: "2026"
  - title: "Conference Reviewer, NeurIPS"
    year: "2025"
  - title: "Conference Reviewer, ICCV"
    year: "2025"
  - title: "Conference Reviewer, CVPR"
    year: "2025"


# CV PDF path (used for all "View CV as PDF" links)
cv_pdf                   : "/files/"

url                      : https://SeokilHam.github.io # The base hostname & protocol for your site e.g. "https://[your GitHub username].github.io",
                                                           # or if you already have some other page hosted on Github then use "https://[your GitHub username].github.io/[Your Repo Name]"
baseurl                  : "" # the subpath of your site, e.g. "/blog"
repository               : "SeokilHam/SeokilHam.github.io"

